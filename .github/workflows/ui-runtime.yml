name: UI runtime

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ui-runtime-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  standalone:
    name: Standalone UI / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-24.04
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
          - label: macos-x86_64
            runner: macos-15-intel
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
          - label: macos-aarch64
            runner: macos-15
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
          - label: windows-x86_64
            runner: windows-latest
            binary: local-shell-mcp.exe
            tui_binary: local-shell-mcp-tui.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller typer

      - name: Build and test Human UI
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run test
          bun run typecheck
          bun run build

      - name: Build one-file executable with embedded OpenTUI
        shell: bash
        run: |
          set -uo pipefail
          EXTRA_PYINSTALLER_ARGS=()
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            EXTRA_PYINSTALLER_ARGS+=(--collect-all winpty)
          fi
          set +e
          pyinstaller \
            --clean \
            --onefile \
            --name local-shell-mcp \
            --collect-all local_shell_mcp \
            --collect-all mcp \
            --collect-all uvicorn \
            --collect-all fastapi \
            --collect-all starlette \
            --exclude-module cryptography \
            "${EXTRA_PYINSTALLER_ARGS[@]}" \
            scripts/pyinstaller-entry.py > pyinstaller.log 2>&1
          status=$?
          set -e
          tail -n 120 pyinstaller.log
          exit "$status"

      - name: Upload PyInstaller failure log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pyinstaller-${{ matrix.label }}-log
          path: pyinstaller.log
          if-no-files-found: ignore

      - name: Report PyInstaller failure
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          tail = "\n".join(Path("pyinstaller.log").read_text(errors="replace").splitlines()[-100:])
          body = "Temporary diagnostic for **${{ matrix.label }}** PyInstaller failure:\n\n```text\n" + tail + "\n```"
          Path("diagnostic.json").write_text(json.dumps({"body": body}))
          PY
          gh api \
            --method POST \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --input diagnostic.json

      - name: Verify WebUI and embedded TUI without sidecar
        shell: bash
        run: |
          set -uo pipefail
          rm -f "ui/dist/${{ matrix.tui_binary }}"
          test ! -e "ui/dist/${{ matrix.tui_binary }}"
          set +e
          python scripts/standalone-ui-smoke.py --server "dist/${{ matrix.binary }}" > smoke.log 2>&1
          status=$?
          set -e
          cat smoke.log
          exit "$status"

      - name: Report standalone UI smoke failure
        if: failure() && github.event_name == 'pull_request' && hashFiles('smoke.log') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          tail = "\n".join(Path("smoke.log").read_text(errors="replace").splitlines()[-100:])
          body = "Temporary diagnostic for **${{ matrix.label }}** standalone UI smoke failure:\n\n```text\n" + tail + "\n```"
          Path("diagnostic.json").write_text(json.dumps({"body": body}))
          PY
          gh api \
            --method POST \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --input diagnostic.json

  docker:
    name: Docker UI / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reclaim hosted-runner disk space
        run: bash scripts/free-ci-disk-space.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: local-shell-mcp:ui-${{ matrix.suffix }}
          cache-from: type=gha,scope=ui-runtime-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=ui-runtime-${{ matrix.suffix }}

      - name: Verify image UI components
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint bash local-shell-mcp:ui-${{ matrix.suffix }} -lc '
            test -s /app/src/local_shell_mcp/ui_static/index.html
            test -s /app/src/local_shell_mcp/ui_static/web.js
            test -s /app/src/local_shell_mcp/ui_static/web.css
            test -x /usr/local/bin/local-shell-mcp-tui
            test "$LOCAL_SHELL_MCP_UI_TUI_COMMAND" = /usr/local/bin/local-shell-mcp-tui
            local-shell-mcp-tui --version
          '

      - name: Exercise Docker WebUI PTY and TUI
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint python \
            -v "$PWD/scripts/standalone-ui-smoke.py:/tmp/standalone-ui-smoke.py:ro" \
            local-shell-mcp:ui-${{ matrix.suffix }} \
            /tmp/standalone-ui-smoke.py \
            --server /opt/local-shell-mcp-venv/bin/local-shell-mcp \
            --use-environment-tui
