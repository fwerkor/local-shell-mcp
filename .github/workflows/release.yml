name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
      push_latest:
        description: "Also publish the Docker image with the latest tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKERHUB_IMAGE_NAME: fwerkor/local-shell-mcp
  GHCR_IMAGE_NAME: ghcr.io/fwerkor/local-shell-mcp
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  BUN_VERSION: "1.3.14"

jobs:
  validate-release:
    name: Validate release input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dockerhub_tags: ${{ steps.docker-tags.outputs.dockerhub_tags }}
      ghcr_tags: ${{ steps.docker-tags.outputs.ghcr_tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag and read project version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v?[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?", tag):
              raise SystemExit(f"Release tag must look like v0.2.0 or 0.2.0, got {tag!r}")

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

              release_version = tag[1:] if tag.startswith("v") else tag
              if release_version != version:
                  raise SystemExit(
                      f"Release tag {tag!r} resolves to version {release_version!r}, "
                      f"but pyproject.toml declares {version!r}"
                  )

          print(f"version={version}")
          PY

      - name: Prepare Docker release tags
        id: docker-tags
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          release_tag = os.environ["RELEASE_TAG"]
          push_latest = os.environ["PUSH_LATEST"] == "true"

          def tags_for(image_name: str) -> list[str]:
              tags = [f"{image_name}:{release_tag}"]
              if release_tag.startswith("v"):
                  tags.append(f"{image_name}:{release_tag[1:]}")
              if push_latest:
                  tags.append(f"{image_name}:latest")
              return tags

          print(f"dockerhub_tags={json.dumps(tags_for(os.environ['DOCKERHUB_IMAGE_NAME']))}")
          print(f"ghcr_tags={json.dumps(tags_for(os.environ['GHCR_IMAGE_NAME']))}")
          PY

  build-python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build embedded WebUI assets
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build:web

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  build-binary:
    name: Build binary (${{ matrix.artifact }})
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            runner: ubuntu-latest
            helper_platform: linux/amd64
            helper_tag: linux-x86_64
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
            archive: tar.gz
          - artifact: linux-aarch64
            runner: ubuntu-24.04-arm
            helper_platform: linux/arm64
            helper_tag: linux-aarch64
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
            archive: tar.gz
          - artifact: macos-x86_64
            runner: macos-15-intel
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
            archive: tar.gz
          - artifact: macos-aarch64
            runner: macos-15
            binary: local-shell-mcp
            tui_binary: local-shell-mcp-tui
            archive: tar.gz
          - artifact: windows-x86_64
            runner: windows-latest
            binary: local-shell-mcp.exe
            tui_binary: local-shell-mcp-tui.exe
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@v4

      - name: Build bundled tmux helper
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/build-tmux-helper.sh "src/local_shell_mcp/helpers/${{ matrix.helper_tag }}/tmux" "${{ matrix.helper_platform }}"

      - name: Build OpenTUI runtime and embedded WebUI
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build

      - name: Build self-contained executable
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller typer
          PYINSTALLER_ARGS=(
            --clean
            --onefile
            --name local-shell-mcp
            --collect-all local_shell_mcp
            --collect-all mcp
            --collect-all uvicorn
            --collect-all fastapi
            --collect-all starlette
            --exclude-module cryptography
          )
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            PYINSTALLER_ARGS+=(--collect-all winpty)
          fi
          pyinstaller "${PYINSTALLER_ARGS[@]}" scripts/pyinstaller-entry.py

      - name: Smoke test embedded OpenTUI runtime
        shell: bash
        run: |
          ./dist/${{ matrix.binary }} --help
          ./ui/dist/${{ matrix.tui_binary }} --version
          python scripts/standalone-ui-smoke.py --server ./dist/${{ matrix.binary }}

      - name: Package executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/local-shell-mcp-${{ matrix.artifact }}
          cp dist/${{ matrix.binary }} release/local-shell-mcp-${{ matrix.artifact }}/
          cp README.md LICENSE release/local-shell-mcp-${{ matrix.artifact }}/
          cat > release/local-shell-mcp-${{ matrix.artifact }}/QUICKSTART.txt <<'EOF'
          Start local-shell-mcp without Docker:

            ./local-shell-mcp --mode mcp

          Open the WebUI at http://127.0.0.1:8765/ui, or launch the native TUI:

            ./local-shell-mcp tui

          Useful environment variables:

            LOCAL_SHELL_MCP_HOST=0.0.0.0
            LOCAL_SHELL_MCP_PORT=8765
            LOCAL_SHELL_MCP_WORKSPACE_ROOT=/path/to/workspace
            LOCAL_SHELL_MCP_AUTH_MODE=oauth
            LOCAL_SHELL_MCP_PUBLIC_BASE_URL=https://your-public-host.example.com
            Generate and export LOCAL_SHELL_MCP_OAUTH_ADMIN_PIN as at least 8 random characters.
            Generate and export LOCAL_SHELL_MCP_OAUTH_JWT_SECRET as at least 32 random bytes.
          EOF
          cd release
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a local-shell-mcp-${{ matrix.artifact }}.zip local-shell-mcp-${{ matrix.artifact }} >/dev/null
          else
            tar -czf local-shell-mcp-${{ matrix.artifact }}.tar.gz local-shell-mcp-${{ matrix.artifact }}
          fi


      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.artifact }}
          path: |
            release/local-shell-mcp-${{ matrix.artifact }}.*
          if-no-files-found: error


  build-vscode-extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Sync extension version from release tag
        working-directory: vscode-extension
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package:vsix


      - uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: |
            dist/local-shell-mcp-vscode-*.vsix
          if-no-files-found: error

  publish-docker-platform:
    name: Publish Docker image (${{ matrix.platform }})
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            suffix: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare platform tags
        id: platform-tags
        env:
          DOCKERHUB_TAGS_JSON: ${{ needs.validate-release.outputs.dockerhub_tags }}
          GHCR_TAGS_JSON: ${{ needs.validate-release.outputs.ghcr_tags }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          dockerhub_tags = json.loads(os.environ["DOCKERHUB_TAGS_JSON"])
          ghcr_tags = json.loads(os.environ["GHCR_TAGS_JSON"])
          suffix = os.environ["SUFFIX"]
          print("tags<<EOF")
          for tag in dockerhub_tags + ghcr_tags:
              print(f"{tag}-{suffix}")
          print("EOF")
          PY

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.platform-tags.outputs.tags }}
          cache-from: type=gha,scope=docker-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.suffix }}

  publish-docker-manifest:
    name: Publish Docker manifest
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - publish-docker-platform
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create and push multi-arch manifests
        env:
          DOCKERHUB_TAGS_JSON: ${{ needs.validate-release.outputs.dockerhub_tags }}
          GHCR_TAGS_JSON: ${{ needs.validate-release.outputs.ghcr_tags }}
        run: |
          python - <<'PY' > /tmp/create-manifests.sh
          import json
          import os

          tags = json.loads(os.environ["DOCKERHUB_TAGS_JSON"]) + json.loads(os.environ["GHCR_TAGS_JSON"])
          for tag in tags:
              print("docker buildx imagetools create \\")
              print(f"  -t {tag} \\")
              print(f"  {tag}-amd64 \\")
              print(f"  {tag}-arm64")
          PY
          bash /tmp/create-manifests.sh

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-python-package
      - build-binary
      - build-vscode-extension
      - publish-docker-manifest
    steps:
      - uses: actions/checkout@v6

      - name: Download Python package artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Download VS Code extension artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-extension
          path: dist


      - name: Create release notes
        run: |
          # shellcheck disable=SC2006
          cat > RELEASE_NOTES.md <<EOF
          Docker images are published to Docker Hub and GHCR under the release tag, the unprefixed semantic-version tag, and optionally `latest`.

          Docker platforms are built in parallel and published as a multi-arch manifest:

          \`\`\`text
          linux/amd64
          linux/arm64
          \`\`\`

          All-in-one executable downloads are attached for:

          \`\`\`text
          linux-x86_64
          linux-aarch64
          macos-x86_64
          macos-aarch64
          windows-x86_64
          \`\`\`

          Start without Docker:

          \`\`\`bash
          ./local-shell-mcp --mode mcp
          \`\`\`

          Then open \`http://127.0.0.1:8765/ui\`, or launch the embedded native TUI through:

          \`\`\`bash
          ./local-shell-mcp tui
          \`\`\`

          VS Code extension download:

          \`\`\`text
          local-shell-mcp-vscode-${{ needs.validate-release.outputs.version }}.vsix
          \`\`\`

          Python package artifacts, executable archives, and the VS Code extension are attached below.

          Python package version in \`pyproject.toml\`: \`${{ needs.validate-release.outputs.version }}\`
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          files: dist/*
