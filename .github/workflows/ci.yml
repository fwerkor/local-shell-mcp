name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  static:
    name: Static / lint, docs, schemas
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ripgrep shellcheck tmux

      - name: Install project with development and docs extras
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,docs]'

      - name: Ruff
        run: ruff check .

      - name: ShellCheck scripts
        run: shellcheck scripts/*.sh

      - name: Export MCP tool schemas
        run: |
          set -euxo pipefail
          python scripts/export-tools-json.py > /tmp/local-shell-mcp-tools.json
          jq length /tmp/local-shell-mcp-tools.json
          test "$(jq length /tmp/local-shell-mcp-tools.json)" -gt 20

      - name: Documentation i18n check
        run: python scripts/check-doc-i18n.py

      - name: Build documentation strictly
        run: mkdocs build --strict

  human-ui:
    name: Human UI / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-24.04
            tui_binary: local-shell-mcp-tui
            check_assets: true
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            tui_binary: local-shell-mcp-tui
            check_assets: false
          - label: macos-x86_64
            runner: macos-15-intel
            tui_binary: local-shell-mcp-tui
            check_assets: false
          - label: macos-aarch64
            runner: macos-15
            tui_binary: local-shell-mcp-tui
            check_assets: false
          - label: windows-x86_64
            runner: windows-latest
            tui_binary: local-shell-mcp-tui.exe
            check_assets: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install UI dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Test, type-check, and build WebUI/OpenTUI
        working-directory: ui
        run: |
          bun test
          bun run typecheck
          bun run build

      - name: Smoke test native OpenTUI sidecar
        shell: bash
        run: ./ui/dist/${{ matrix.tui_binary }} --version

      - name: Smoke test platform PTY and WebSocket bridge
        run: python scripts/ui-pty-smoke.py --tui ui/dist/${{ matrix.tui_binary }}

      - name: Verify embedded WebUI assets are reproducible
        if: matrix.check_assets
        run: git diff --exit-code -- src/local_shell_mcp/ui_static

  human-ui-e2e:
    name: Human UI / OAuth browser E2E
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install project and browser runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m playwright install --with-deps chromium

      - name: Build the shared OpenTUI and WebUI
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun test
          bun run typecheck
          bun run build

      - name: Run OAuth, PTY, navigation, and responsive browser smoke test
        run: python scripts/ui-smoke.py

  coverage:
    name: Coverage / unit and process E2E
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install test dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep tmux
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m playwright install --with-deps chromium

      - name: Build and test Human UI
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun test
          bun run typecheck
          bun run build

      - name: Collect combined branch coverage
        run: bash scripts/run-coverage.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: error


  python-tests:
    name: Python / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64 py3.11
            runner: ubuntu-24.04
            python-version: "3.11"
          - label: linux-x86_64 py3.12
            runner: ubuntu-24.04
            python-version: "3.12"
          - label: linux-aarch64 py3.11
            runner: ubuntu-24.04-arm
            python-version: "3.11"
          - label: linux-aarch64 py3.12
            runner: ubuntu-24.04-arm
            python-version: "3.12"
          - label: macos-x86_64 py3.12
            runner: macos-15-intel
            python-version: "3.12"
          - label: macos-aarch64 py3.12
            runner: macos-15
            python-version: "3.12"
          - label: windows-x86_64 py3.11
            runner: windows-latest
            python-version: "3.11"
          - label: windows-x86_64 py3.12
            runner: windows-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux runtime tools
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep tmux

      - name: Remove unused Homebrew taps
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          set -euxo pipefail
          brew untap --force aws/tap >/dev/null 2>&1 || true
          brew untap --force azure/bicep >/dev/null 2>&1 || true

      - name: Install macOS runtime tools
        if: runner.os == 'macOS'
        env:
          HOMEBREW_REQUIRE_TAP_TRUST: "1"
        run: |
          set -euxo pipefail
          brew install ripgrep tmux

      - name: Install Windows runtime tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Show runtime versions
        run: |
          python --version
          local-shell-mcp --version
          local-shell-mcp version

      - name: Run pytest
        run: pytest -vv --durations=25

  endpoint-smoke:
    name: Endpoint / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64 REST none
            runner: ubuntu-24.04
            python-version: "3.12"
            mode: http
            auth: none
          - label: linux-aarch64 REST none
            runner: ubuntu-24.04-arm
            python-version: "3.12"
            mode: http
            auth: none
          - label: macos-aarch64 REST none
            runner: macos-15
            python-version: "3.12"
            mode: http
            auth: none
          - label: windows-x86_64 REST none
            runner: windows-latest
            python-version: "3.12"
            mode: http
            auth: none
          - label: linux-x86_64 MCP oauth
            runner: ubuntu-24.04
            python-version: "3.12"
            mode: mcp
            auth: oauth
          - label: linux-aarch64 MCP oauth
            runner: ubuntu-24.04-arm
            python-version: "3.12"
            mode: mcp
            auth: oauth
          - label: macos-aarch64 MCP oauth
            runner: macos-15
            python-version: "3.12"
            mode: mcp
            auth: oauth
          - label: windows-x86_64 MCP oauth
            runner: windows-latest
            python-version: "3.12"
            mode: mcp
            auth: oauth
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux runtime tools
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep tmux

      - name: Remove unused Homebrew taps
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          set -euxo pipefail
          brew untap --force aws/tap >/dev/null 2>&1 || true
          brew untap --force azure/bicep >/dev/null 2>&1 || true

      - name: Install macOS runtime tools
        if: runner.os == 'macOS'
        env:
          HOMEBREW_REQUIRE_TAP_TRUST: "1"
        run: |
          set -euxo pipefail
          brew install ripgrep tmux

      - name: Install Windows runtime tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Boot server and run endpoint smoke test
        run: python scripts/ci-smoke.py --mode ${{ matrix.mode }} --auth ${{ matrix.auth }}

  package:
    name: Package / ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: wheel linux-x86_64
            artifact: wheel-linux-x86_64
            runner: ubuntu-24.04
          - label: wheel linux-aarch64
            artifact: wheel-linux-aarch64
            runner: ubuntu-24.04-arm
          - label: wheel macos-aarch64
            artifact: wheel-macos-aarch64
            runner: macos-15
          - label: wheel windows-x86_64
            artifact: wheel-windows-x86_64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in clean virtualenv and smoke test CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv /tmp/local-shell-mcp-wheel-venv
          /tmp/local-shell-mcp-wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/local-shell-mcp-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/local-shell-mcp-wheel-venv/bin/local-shell-mcp --version
          /tmp/local-shell-mcp-wheel-venv/bin/local-shell-mcp version

      - name: Install wheel in clean virtualenv and smoke test CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv $env:TEMP\local-shell-mcp-wheel-venv
          & $env:TEMP\local-shell-mcp-wheel-venv\Scripts\python.exe -m pip install --upgrade pip
          & $env:TEMP\local-shell-mcp-wheel-venv\Scripts\python.exe -m pip install (Get-Item dist\*.whl).FullName
          & $env:TEMP\local-shell-mcp-wheel-venv\Scripts\local-shell-mcp.exe --version
          & $env:TEMP\local-shell-mcp-wheel-venv\Scripts\local-shell-mcp.exe version

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error


  bundled-tmux:
    name: Bundled tmux / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-24.04
            platform: linux/amd64
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and smoke test helper
        shell: bash
        run: |
          set -euxo pipefail
          scripts/build-tmux-helper.sh /tmp/local-shell-mcp-tmux "${{ matrix.platform }}"
          /tmp/local-shell-mcp-tmux -L local-shell-mcp-ci new-session -d -s smoke "sh -lc 'printf ready; sleep 5'"
          sleep 1
          /tmp/local-shell-mcp-tmux -L local-shell-mcp-ci capture-pane -p -t smoke | grep ready
          /tmp/local-shell-mcp-tmux -L local-shell-mcp-ci kill-server


  docker:
    name: Docker / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reclaim hosted-runner disk space
        run: bash scripts/free-ci-disk-space.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: local-shell-mcp:ci-${{ matrix.suffix }}
          cache-from: type=gha,scope=ci-docker-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=ci-docker-${{ matrix.suffix }}

      - name: Smoke test Docker image CLI
        run: |
          set -euxo pipefail
          docker run --rm local-shell-mcp:ci-${{ matrix.suffix }} local-shell-mcp --version
          docker run --rm local-shell-mcp:ci-${{ matrix.suffix }} local-shell-mcp version

  compose:
    name: Docker Compose / config and build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build Compose service image
        run: docker compose build local-shell-mcp

  binary-release-matrix:
    name: Binary / release matrix coverage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release binary matrix
        run: python scripts/check-release-matrix.py

  vscode-extension:
    name: VS Code / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-24.04
          - label: macos-aarch64
            runner: macos-15
          - label: windows-x86_64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package:vsix

      - name: Check VSIX artifact
        shell: bash
        run: |
          set -euxo pipefail
          ls -lh dist/*.vsix
          test -s dist/*.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-${{ matrix.label }}
          path: dist/*.vsix
          if-no-files-found: error

  ci-summary:
    name: CI / all matrix jobs passed
    runs-on: ubuntu-24.04
    needs:
      - static
      - human-ui
      - human-ui-e2e
      - coverage
      - python-tests
      - endpoint-smoke
      - package
      - bundled-tmux
      - docker
      - compose
      - binary-release-matrix
      - vscode-extension
    if: always()
    steps:
      - name: Check aggregate result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: data["result"] for name, data in needs.items() if data["result"] != "success"}
          if failed:
              print("Failed jobs:")
              for name, result in failed.items():
                  print(f"- {name}: {result}")
              sys.exit(1)
          print("All CI matrix jobs passed.")
          PY
