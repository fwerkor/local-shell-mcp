name: CI
on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux ripgrep
      - name: Install package in editable mode
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run CLI smoke tests
        run: |
          local-shell-mcp --version
          local-shell-mcp version
          python scripts/export-tools-json.py > /tmp/local-shell-mcp-tools.json
          test -s /tmp/local-shell-mcp-tools.json
      - run: ruff check .
      - run: pytest -q

  package-smoke:
    name: Build and install wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel in a clean virtualenv
        run: |
          python -m venv /tmp/local-shell-mcp-wheel-venv
          /tmp/local-shell-mcp-wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/local-shell-mcp-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/local-shell-mcp-wheel-venv/bin/local-shell-mcp --version
          /tmp/local-shell-mcp-wheel-venv/bin/local-shell-mcp version
          /tmp/local-shell-mcp-wheel-venv/bin/python - <<'PY'
          from local_shell_mcp.version import version_info
          assert version_info()["version"]
          PY

  docker-smoke:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t local-shell-mcp:ci .
      - name: Run image smoke tests
        run: |
          docker run --rm local-shell-mcp:ci local-shell-mcp --version
          docker run --rm local-shell-mcp:ci local-shell-mcp version

  vscode-extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - working-directory: vscode-extension
        run: npm ci
      - working-directory: vscode-extension
        run: npm run compile
      - working-directory: vscode-extension
        run: npm run package:vsix
      - name: Check VSIX artifact
        run: |
          ls -lh dist/*.vsix
          test -s dist/*.vsix
