name: Apply UI runtime patch

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/embedded-ui-runtime
          fetch-depth: 0

      - name: Replace Bash 3.2-unsafe PyInstaller argument handling
        run: |
          python - <<'PY'
          from pathlib import Path

          replacement = [
              "          PYINSTALLER_ARGS=(",
              "            --clean",
              "            --onefile",
              "            --name local-shell-mcp",
              "            --collect-all local_shell_mcp",
              "            --collect-all mcp",
              "            --collect-all uvicorn",
              "            --collect-all fastapi",
              "            --collect-all starlette",
              "            --exclude-module cryptography",
              "          )",
              '          if [[ "${RUNNER_OS}" == "Windows" ]]; then',
              "            PYINSTALLER_ARGS+=(--collect-all winpty)",
              "          fi",
              '          pyinstaller "${PYINSTALLER_ARGS[@]}" scripts/pyinstaller-entry.py',
          ]

          for name in (
              ".github/workflows/ci.yml",
              ".github/workflows/release.yml",
              ".github/workflows/ui-runtime.yml",
          ):
              path = Path(name)
              lines = path.read_text().splitlines()
              starts = [i for i, line in enumerate(lines) if line.strip() == "EXTRA_PYINSTALLER_ARGS=()"]
              if len(starts) != 1:
                  raise SystemExit(f"{name}: expected one unsafe block, found {len(starts)}")
              start = starts[0]
              ends = [
                  i
                  for i in range(start, len(lines))
                  if lines[i].strip() == "scripts/pyinstaller-entry.py"
              ]
              if len(ends) != 1:
                  raise SystemExit(f"{name}: could not locate PyInstaller entry line")
              end = ends[0]
              path.write_text("\n".join(lines[:start] + replacement + lines[end + 1 :]) + "\n")

          Path(".github/workflows/apply-ui-runtime-patch.yml").unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "Cao Yuhang"
          git config user.email "caoyuhang@fwerkor.com"
          git add .github/workflows/ci.yml .github/workflows/release.yml .github/workflows/ui-runtime.yml .github/workflows/apply-ui-runtime-patch.yml
          git commit -m "fix(ci): support macOS Bash 3.2 in binary builds"
          git push origin HEAD:fix/embedded-ui-runtime
