name: UI debug

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-x86:
    runs-on: macos-15-intel
    outputs:
      status: ${{ steps.diagnose.outputs.status }}
      diagnostic: ${{ steps.diagnose.outputs.diagnostic }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: python -m pip install -e . pyinstaller typer
      - working-directory: ui
        run: bun install --frozen-lockfile && bun run build
      - id: diagnose
        shell: bash
        run: |
          set +e
          pyinstaller --clean --onefile --name local-shell-mcp \
            --collect-all local_shell_mcp --collect-all mcp \
            --collect-all uvicorn --collect-all fastapi --collect-all starlette \
            --exclude-module cryptography scripts/pyinstaller-entry.py > diagnostic.log 2>&1
          status=$?
          python - "$status" <<'PY' >> "$GITHUB_OUTPUT"
          import re, sys
          from pathlib import Path
          lines = [x.strip() for x in Path("diagnostic.log").read_text(errors="replace").splitlines() if x.strip()]
          useful = [x for x in lines if any(k in x.lower() for k in ("error", "exception", "failed", "traceback", "errno"))]
          text = " | ".join((useful or lines)[-4:])
          text = re.sub(r"[^A-Za-z0-9.,_()=+ -]+", "_", text)[:170].strip() or "no diagnostic"
          print(f"status={sys.argv[1]}")
          print(f"diagnostic={text}")
          PY
          exit 0

  macos-x86-result:
    needs: macos-x86
    if: always()
    name: macOS x86 result - ${{ needs.macos-x86.outputs.diagnostic }}
    runs-on: ubuntu-24.04
    steps:
      - run: test "${{ needs.macos-x86.outputs.status }}" = "0"

  macos-arm:
    runs-on: macos-15
    outputs:
      status: ${{ steps.diagnose.outputs.status }}
      diagnostic: ${{ steps.diagnose.outputs.diagnostic }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: python -m pip install -e . pyinstaller typer
      - working-directory: ui
        run: bun install --frozen-lockfile && bun run build
      - id: diagnose
        shell: bash
        run: |
          set +e
          pyinstaller --clean --onefile --name local-shell-mcp \
            --collect-all local_shell_mcp --collect-all mcp \
            --collect-all uvicorn --collect-all fastapi --collect-all starlette \
            --exclude-module cryptography scripts/pyinstaller-entry.py > diagnostic.log 2>&1
          status=$?
          python - "$status" <<'PY' >> "$GITHUB_OUTPUT"
          import re, sys
          from pathlib import Path
          lines = [x.strip() for x in Path("diagnostic.log").read_text(errors="replace").splitlines() if x.strip()]
          useful = [x for x in lines if any(k in x.lower() for k in ("error", "exception", "failed", "traceback", "errno"))]
          text = " | ".join((useful or lines)[-4:])
          text = re.sub(r"[^A-Za-z0-9.,_()=+ -]+", "_", text)[:170].strip() or "no diagnostic"
          print(f"status={sys.argv[1]}")
          print(f"diagnostic={text}")
          PY
          exit 0

  macos-arm-result:
    needs: macos-arm
    if: always()
    name: macOS ARM result - ${{ needs.macos-arm.outputs.diagnostic }}
    runs-on: ubuntu-24.04
    steps:
      - run: test "${{ needs.macos-arm.outputs.status }}" = "0"

  windows:
    runs-on: windows-latest
    outputs:
      status: ${{ steps.diagnose.outputs.status }}
      diagnostic: ${{ steps.diagnose.outputs.diagnostic }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: python -m pip install -e . pyinstaller typer
      - working-directory: ui
        run: bun install --frozen-lockfile && bun run build
      - id: diagnose
        shell: bash
        run: |
          set +e
          pyinstaller --clean --onefile --name local-shell-mcp \
            --collect-all local_shell_mcp --collect-all mcp \
            --collect-all uvicorn --collect-all fastapi --collect-all starlette \
            --collect-all winpty --exclude-module cryptography scripts/pyinstaller-entry.py > diagnostic.log 2>&1
          status=$?
          if [[ "$status" = 0 ]]; then
            rm -f ui/dist/local-shell-mcp-tui.exe
            python scripts/standalone-ui-smoke.py --server dist/local-shell-mcp.exe > diagnostic.log 2>&1
            status=$?
          fi
          python - "$status" <<'PY' >> "$GITHUB_OUTPUT"
          import re, sys
          from pathlib import Path
          lines = [x.strip() for x in Path("diagnostic.log").read_text(errors="replace").splitlines() if x.strip()]
          useful = [x for x in lines if any(k in x.lower() for k in ("error", "exception", "failed", "traceback", "timeout"))]
          text = " | ".join((useful or lines)[-4:])
          text = re.sub(r"[^A-Za-z0-9.,_()=+ -]+", "_", text)[:170].strip() or "no diagnostic"
          print(f"status={sys.argv[1]}")
          print(f"diagnostic={text}")
          PY
          exit 0

  windows-result:
    needs: windows
    if: always()
    name: Windows result - ${{ needs.windows.outputs.diagnostic }}
    runs-on: ubuntu-24.04
    steps:
      - run: test "${{ needs.windows.outputs.status }}" = "0"
