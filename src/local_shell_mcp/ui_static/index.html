<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050a16" />
    <title>local-shell-mcp</title>
    <link rel="stylesheet" href="__LSM_UI_PATH__/assets/web.css" />
  </head>
  <body>
    <svg class="glass-filters" aria-hidden="true" focusable="false">
      <defs>
        <filter id="liquid-distortion" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.009 0.017" numOctaves="2" seed="13" result="noise">
            <animate attributeName="baseFrequency" dur="14s" values="0.009 0.017;0.014 0.010;0.009 0.017" repeatCount="indefinite" />
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="B" />
        </filter>
      </defs>
    </svg>
    <div class="wallpaper" aria-hidden="true"></div>
    <div class="aurora" aria-hidden="true"><i></i><i></i><i></i></div>
    <main class="shell">
      <div class="liquid-surface" aria-hidden="true">
        <span class="liquid-lens liquid-lens--one"></span>
        <span class="liquid-lens liquid-lens--two"></span>
        <span class="liquid-lens liquid-lens--three"></span>
        <span class="liquid-rim"></span>
      </div>
      <header class="chrome">
        <div class="brand">
          <span class="brand-mark">LSM</span>
          <span class="brand-name">local-shell-mcp</span>
        </div>
        <div class="connection" id="connection-state"><span></span><strong>Starting</strong></div>
        <div class="chrome-actions">
          <button id="reconnect-button" type="button" title="Reconnect" aria-label="Reconnect">
            <span class="wide-label">Reconnect</span><span class="compact-label" aria-hidden="true">↻</span>
          </button>
          <button id="fullscreen-button" type="button" title="Toggle fullscreen" aria-label="Toggle fullscreen">
            <span class="wide-label">Fullscreen</span><span class="compact-label" aria-hidden="true">⛶</span>
          </button>
        </div>
      </header>
      <section class="terminal-frame" aria-label="local-shell-mcp terminal user interface">
        <div id="terminal"></div>
        <nav class="touchbar" id="touchbar" aria-label="Terminal shortcut keys">
          <button type="button" data-key="escape">Esc</button>
          <button type="button" data-key="tab">Tab</button>
          <button type="button" data-key="left" aria-label="Left arrow">←</button>
          <button type="button" data-key="up" aria-label="Up arrow">↑</button>
          <button type="button" data-key="down" aria-label="Down arrow">↓</button>
          <button type="button" data-key="right" aria-label="Right arrow">→</button>
          <button type="button" data-key="enter">Enter</button>
          <button type="button" data-key="help">F1</button>
          <button id="keyboard-button" type="button" data-key="keyboard" aria-label="Show keyboard" aria-pressed="false">KB</button>
        </nav>
        <div class="scanline" aria-hidden="true"></div>
        <section class="gate" id="auth-gate" hidden>
          <div class="gate-card">
            <div class="gate-icon">LSM</div>
            <p class="eyebrow">Protected control plane</p>
            <h1>Human Interface</h1>
            <p>Authenticate with the same OAuth service used by MCP, then the exact OpenTUI application will start inside this browser terminal.</p>
            <button id="login-button" type="button">Authenticate</button>
            <small id="gate-detail">No credentials are stored outside this browser session.</small>
          </div>
        </section>
      </section>
      <footer class="footer">
        <span>OpenTUI over authenticated PTY</span>
        <span id="terminal-size">—</span>
      </footer>
    </main>
    <script>window.__LSM_UI_CONFIG__ = __LSM_UI_CONFIG_JSON__;</script>
    <script type="module" src="__LSM_UI_PATH__/assets/web.js"></script>
    <script type="module" src="__LSM_UI_PATH__/assets/liquid-glass.js"></script>
  </body>
</html>
