services:
  local-shell-mcp:
    image: fwerkor/local-shell-mcp:latest
    container_name: local-shell-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      LOCAL_SHELL_MCP_MODE: "mcp"
      LOCAL_SHELL_MCP_HOST: "0.0.0.0"
      LOCAL_SHELL_MCP_PORT: "8765"
      LOCAL_SHELL_MCP_WORKSPACE_ROOT: "/workspace"
      LOCAL_SHELL_MCP_AUTH_MODE: "${LOCAL_SHELL_MCP_AUTH_MODE:-oauth}"
      LOCAL_SHELL_MCP_MCP_SESSION_IDLE_TIMEOUT_S: "${LOCAL_SHELL_MCP_MCP_SESSION_IDLE_TIMEOUT_S:-300}"
      LOCAL_SHELL_MCP_MCP_MAX_SESSIONS: "${LOCAL_SHELL_MCP_MCP_MAX_SESSIONS:-1024}"
      LOCAL_SHELL_MCP_PUBLIC_BASE_URL: "${LOCAL_SHELL_MCP_PUBLIC_BASE_URL:-}"
      LOCAL_SHELL_MCP_OAUTH_ADMIN_PIN: "${LOCAL_SHELL_MCP_OAUTH_ADMIN_PIN:-}"
      LOCAL_SHELL_MCP_OAUTH_JWT_SECRET: "${LOCAL_SHELL_MCP_OAUTH_JWT_SECRET:-}"
      LOCAL_SHELL_MCP_ALLOW_FULL_CONTAINER: "${LOCAL_SHELL_MCP_ALLOW_FULL_CONTAINER:-false}"
      LOCAL_SHELL_MCP_PERSISTENT_CREDENTIALS: "${LOCAL_SHELL_MCP_PERSISTENT_CREDENTIALS:-true}"
      LOCAL_SHELL_MCP_CREDENTIALS_DIR: "/persist/credentials"
      LOCAL_SHELL_MCP_REMOTE_ENABLED: "${LOCAL_SHELL_MCP_REMOTE_ENABLED:-true}"
      LOCAL_SHELL_MCP_REMOTE_INVITE_TTL_S: "${LOCAL_SHELL_MCP_REMOTE_INVITE_TTL_S:-600}"
      LOCAL_SHELL_MCP_REMOTE_POLL_TIMEOUT_S: "${LOCAL_SHELL_MCP_REMOTE_POLL_TIMEOUT_S:-25}"
      LOCAL_SHELL_MCP_REMOTE_JOB_TIMEOUT_S: "${LOCAL_SHELL_MCP_REMOTE_JOB_TIMEOUT_S:-3600}"
      LOCAL_SHELL_MCP_UI_ENABLED: "${LOCAL_SHELL_MCP_UI_ENABLED:-true}"
      LOCAL_SHELL_MCP_UI_PATH: "${LOCAL_SHELL_MCP_UI_PATH:-/ui}"
      LOCAL_SHELL_MCP_UI_WALLPAPER: "${LOCAL_SHELL_MCP_UI_WALLPAPER:-bing}"
      LOCAL_SHELL_MCP_UI_TERMINAL_IDLE_TIMEOUT_S: "${LOCAL_SHELL_MCP_UI_TERMINAL_IDLE_TIMEOUT_S:-3600}"
      LOCAL_SHELL_MCP_UI_TERMINAL_MAX_SESSIONS: "${LOCAL_SHELL_MCP_UI_TERMINAL_MAX_SESSIONS:-8}"
      LOCAL_SHELL_MCP_SHELL_ENV_BLOCKLIST: "${LOCAL_SHELL_MCP_SHELL_ENV_BLOCKLIST:-CLOUDFLARE_TUNNEL_TOKEN}"
      LOCAL_SHELL_MCP_SHELL_ENV_BLOCKED_PREFIXES: "${LOCAL_SHELL_MCP_SHELL_ENV_BLOCKED_PREFIXES:-LOCAL_SHELL_MCP_,DOCKER_}"
    volumes:
      - ./workspaces/default:/workspace
      - local-shell-mcp-credentials:/persist/credentials
      # Optional: mount an ssh-agent socket instead of private keys.
      # - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
    # environment:
    #   SSH_AUTH_SOCK: ${SSH_AUTH_SOCK}

  # Optional Cloudflare Tunnel sidecar. This does not use Cloudflare Access.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: local-shell-mcp-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - local-shell-mcp

volumes:
  local-shell-mcp-credentials:
