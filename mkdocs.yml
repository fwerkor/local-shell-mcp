site_name: local-shell-mcp
site_description: ChatGPT-compatible MCP server for controlled local shell, filesystem, git, browser, and remote-worker access.
site_url: https://fwerkor.github.io/local-shell-mcp/
repo_url: https://github.com/fwerkor/local-shell-mcp
repo_name: fwerkor/local-shell-mcp
nav:
  - Home: index.md
  - Getting started:
      - Quickstart: getting-started/quickstart.md
      - Runtime vs client model: guides/deployment.md
  - Runtime installation:
      - Choose a runtime: guides/deployment.md
      - Docker Compose: installation/docker.md
      - VS Code extension: installation/vscode-extension.md
      - Standalone binary: installation/binary.md
      - Python / pipx / source: installation/python.md
      - Stdio mode: installation/stdio.md
  - Client connections:
      - ChatGPT connector: getting-started/chatgpt-connector.md
      - Generic MCP clients: clients/generic-mcp.md
      - Network connectivity: clients/connectivity.md
  - Guides:
      - Usage patterns: guides/usage-patterns.md
      - Remote workers: guides/remote-workers.md
      - File links: guides/file-links.md
      - Git access: guides/git-access.md
      - Browser automation: guides/browser-automation.md
      - Audit log: guides/audit-log.md
      - Skills: guides/skills.md
  - Reference:
      - Tools: reference/tools.md
      - Configuration: reference/configuration.md
      - REST API: reference/rest-api.md
  - Security: security.md
  - Troubleshooting: troubleshooting.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
